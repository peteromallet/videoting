  segments:
  - start: 0.48
    end: 4.48
    text: Three years ago, I became obsessed with using anchor images to drive video
      generation.
  - start: 5.14
    end: 9.3
    text: I felt like the right balance between creative control and the magic that
      these models can do.
  - start: 9.64
    end: 13.14
    text: So I built a tool and made a video for a poem I will be using it.
  - start: 13.36
    end: 17.16
    text: This was pre-video model, so I was using Google Film. The result was pretty
      bad.
  - start: 17.74
    end: 22.86
    text: Last year, I built another tool using AnimateDiff, Doe, and I made a new
      version of that video.
  - start: 23.14
    end: 27.98
    text: Again, not great. You're probably thinking I should have given up those
      points, but no, I'm back for a third time.
  - start: 27.98
    end: 33.16
    text: This tool is called Ray, and it's a free and open-source tool focused just
      on this mode of creation.
  - start: 33.94
    end: 37.06
    text: Rather than just listing out all the features, let me show you what it's
      like to create a shot.
  - start: 37.96
    end: 42.96
    text: This video is based in North Carolina in the 1940s, so I wanted to use a
      Norman Rockwell style.
  - start: 43.4
    end: 49.18
    text: It starts on a bus, so inside Ray, I used the InStyle, a Quinelli Laura
      I trained, to generate a bunch of different buses.
  - start: 49.42
    end: 53.56
    text: I wanted it to feel like a quiet rural road, just on the cusp of the first
      snow of the year.
  - start: 53.56
    end: 58.88
    text: So I generated a bunch of environments using my InSubject Laura to keep
      the bus consistent. This one looked good.
  - start: 59.36
    end: 63.8
    text: From there, I just needed the right angle. The song starts slowly, so I
      thought it would be cool to have it driving up
  - start: 63.92
    end: 67.58
    text: and then zooming in on the front of the bus once the music really hits.
  - start: 68.26
    end: 73.24
    text: Inside the bus, I wanted every detail to feel as close as possible to what
      it actually would have looked and felt like.
  - start: 73.8
    end: 77.34
    text: I saw someone sitting there who looked like they could be my main character,
      so I zoomed in on him.
  - start: 77.94
    end: 81.34
    text: I then went outside the window, and now it was time to animate these images.
  - start: 81.34
    end: 87.24
    text: The first few shots animated really well out of the box, but for the next
      shots, I needed to guide the camera motion.
  - start: 87.7
    end: 92.4
    text: So I used Unity3C, which is built into Ray for one, to record and steer
      the animation.
  - start: 92.92
    end: 96.84
    text: I stitched them all together using Face inside Ray, and here's the result.
